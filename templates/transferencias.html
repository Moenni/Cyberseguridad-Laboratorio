<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido {username} a Transferencias Seguras</title>
</head>
<body>
    <h1>Bienvenido de nuevo, {username}!</h1>

    <form action="/transfer" method="POST">
        <input type="hidden" name="csrf_token" value="{csrf_token}">

        <label for="monto">Monto:</label>
        <input type="text" id="monto" name="monto" 
               placeholder="Ingrese el monto" title="Monto a transferir">

        <br><br>

        <label for="cuenta">Cuenta:</label>
        <input type="text" id="cuenta" name="cuenta" 
               placeholder="Ingrese la cuenta" title="Número de cuenta destino">

        <br><br>

        <input type="submit" value="Enviar transferencia">
    </form>

    <hr>
    <p>Opciones de navegación:</p>
    <ul>
        <li><a href="/login">Cerrar sesión</a></li>
        <li><a href="/comment">Ir a comentarios</a></li>
    </ul>
</body>
</html>
</body>
</html>
